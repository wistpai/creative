<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>創作工具簡易入口</title>
  <style>
    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: linear-gradient(180deg, #f8fafc 0%, #eef3f8 100%);
      color: #243447;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 56px 24px 72px;
    }

    .hero {
      text-align: center;
      margin-bottom: 44px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: 2.4rem;
      letter-spacing: 0.04em;
      color: #1f2d3d;
    }

    .hero .author {
      margin: 0 0 18px;
      font-size: 1rem;
      color: #5b6b7a;
    }

    .hero .desc {
      margin: 0 auto;
      max-width: 720px;
      line-height: 1.9;
      font-size: 1.05rem;
      color: #425466;
    }

    .tool-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }

    .tool-card {
      background: #ffffff;
      border-radius: 18px;
      padding: 28px 24px;
      box-shadow: 0 10px 30px rgba(31, 45, 61, 0.08);
      border: 1px solid rgba(120, 140, 160, 0.12);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .tool-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 14px 36px rgba(31, 45, 61, 0.12);
    }

    .tool-card h2 {
      margin: 0 0 14px;
      font-size: 1.35rem;
      color: #1f2d3d;
      line-height: 1.4;
    }

    .tool-card p {
      margin: 0 0 24px;
      line-height: 1.8;
      color: #5b6b7a;
      flex-grow: 1;
    }

    .tool-card a {
      display: inline-block;
      text-decoration: none;
      text-align: center;
      background: #2f6fed;
      color: #ffffff;
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: 700;
      letter-spacing: 0.03em;
      transition: background 0.2s ease;
    }

    .tool-card a:hover {
      background: #2458bc;
    }

    .footer {
      margin-top: 48px;
      text-align: center;
      font-size: 0.95rem;
      color: #738496;
    }

    @media (max-width: 640px) {
      .container {
        padding: 40px 18px 56px;
      }

      .hero h1 {
        font-size: 2rem;
      }

      .tool-card {
        padding: 22px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="hero">
      <h1>創作工具簡易入口</h1>
      <p class="author">by Pai Pin Chien</p>
      <p class="desc">
        以下為世新大學中文系白品鍵為文學創作課程所開發的創作工具，請點選下方按鈕前往。
      </p>
    </header>

    <main class="tool-grid">
      <section class="tool-card">
        <h2>故事大綱創作加速器</h2>
        <p>
          透過角色設定、素材擴充與故事架構設計，協助使用者逐步完成故事大綱。
        </p>
        <a href="https://script.google.com/macros/s/AKfycbzHI-JmA1xYrWO3ccqNkoo35PcdmxnLkkA4sahtj-nb3JZ4PCsByLuTmt5LAkOVI9w4/exec" target="_blank" rel="noopener noreferrer">
          進入網站
        </a>
      </section>

      <section class="tool-card">
        <h2>集體創作故事元素組合器</h2>
        <p>
          集結多人提供的故事元素，快速組合角色、事件與情境，作為創作發想的起點。
        </p>
        <a href="https://script.google.com/macros/s/AKfycbyquW3ot6Nn8-VyLitAc5ota2p_36UW_rgEflYhPxTnAn3BEmiBT23Be-NvrEZERfDo/exec" target="_blank" rel="noopener noreferrer">
          進入網站
        </a>
      </section>

      <section class="tool-card">
        <h2>創作力六邊型</h2>
        <p>
          以六個面向整理與觀察創作能力結構，作為課程討論與自我理解的輔助工具。
        </p>
       <a href="./hexagon/" target="_blank">
          進入網站
        </a>
      </section>
    </main>

    <footer class="footer">
      世新大學中文系文學創作課程工具入口
    </footer>
  </div>
</body>
</html>
